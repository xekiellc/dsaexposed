name: DSA Exposed News Pipeline

on:
  schedule:
    - cron: '0 6,12,18,0 * * *'  # 6am, 12pm, 6pm, midnight UTC
  workflow_dispatch:  # manual trigger

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install axios

      - name: Run news pipeline
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-news.js

      - name: Commit updated news.json
        run: |
          git config --global user.name 'DSA Exposed Bot'
          git config --global user.email 'bot@dsaexposed.com'
          git add data/news.json
          git diff --staged --quiet || git commit -m 'chore: update news feed [skip ci]'
          git push
